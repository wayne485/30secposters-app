<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Poster App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #0a0a0a; color: #fff; font-family: -apple-system, "Segoe UI", Arial, sans-serif; overscroll-behavior: none; }
button { font-family: inherit; }
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  width: 100%;
  padding: 24px 20px;
  gap: 16px;
}
.screen.active { display: flex; }

/* ---------- Buttons ---------- */
.btn-gold {
  width: 100%; max-width: 480px; padding: 18px;
  background: #dac16d; color: #000; border: none; border-radius: 14px;
  font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em;
  cursor: pointer;
}
.btn-gold:active { background: #c4ab59; }
.btn-sec {
  width: 100%; max-width: 480px; padding: 15px;
  background: #1a1a1a; color: #dac16d; border: 2px solid #dac16d; border-radius: 12px;
  font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em;
  cursor: pointer;
}

/* ---------- Style select ---------- */
#s-style-select h2 { font-size: 24px; font-weight: 900; text-align: center; margin: 12px 0 8px; color: #dac16d; }
.style-grid {
  width: 100%; max-width: 480px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.style-card {
  background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 14px;
  overflow: hidden; cursor: pointer; padding: 0; display: flex; flex-direction: column;
}
.style-card img { width: 100%; aspect-ratio: 3354/4743; object-fit: cover; display: block; }
.style-card .label { padding: 10px; font-size: 13px; font-weight: 800; text-align: center; text-transform: uppercase; letter-spacing: 0.03em; }

/* ---------- Upload ---------- */
#s-upload p { font-size: 18px; font-weight: 700; text-align: center; line-height: 1.5; max-width: 480px; }
#s-upload .gold-line { color: #dac16d; }

/* ---------- Text entry ---------- */
.input-group { width: 100%; max-width: 480px; text-align: left; }
.input-group label { display: block; font-size: 11px; color: #dac16d; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 6px; }
.input-group input[type="text"] {
  width: 100%; background: #161616; border: 1px solid #2a2a2a; border-radius: 10px;
  padding: 14px; color: #fff; font-size: 16px; font-weight: 700; outline: none; text-transform: uppercase;
}
.input-group input[type="text"]:focus { border-color: #dac16d; }
.color-row { width: 100%; max-width: 480px; display: flex; gap: 12px; }
.color-group { flex: 1; text-align: left; }
.color-group label { display: block; font-size: 11px; color: #dac16d; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 6px; }
.color-group input[type="color"] {
  width: 100%; height: 52px; border: 1px solid #2a2a2a; border-radius: 10px; background: #161616; cursor: pointer; padding: 4px;
}

/* ---------- Position / crop ---------- */
.canvas-wrap {
  position: relative; width: 100%; max-width: 480px; aspect-ratio: 3354/4743;
  border-radius: 14px; overflow: hidden; touch-action: none; background: #111; flex-shrink: 0;
}
#position-canvas { width: 100%; height: 100%; display: block; }
.hint-pill {
  position: absolute; top: 12px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 5;
}
.hint-pill span {
  background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 700;
}

/* ---------- Preview ---------- */
#preview-canvas { width: 100%; max-width: 480px; aspect-ratio: 3354/4743; display: block; border-radius: 14px; }

.loading-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.6); z-index: 10; border-radius: 14px;
}
.spinner {
  width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #dac16d;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- SPLASH -->
<div class="screen active" id="s-splash">
  <div style="margin-top:40vh;font-size:20px;font-weight:900;color:#dac16d;">Loading...</div>
</div>

<!-- STYLE SELECT -->
<div class="screen" id="s-style-select">
  <h2>Choose your poster</h2>
  <div class="style-grid" id="style-grid"></div>
</div>

<!-- UPLOAD -->
<div class="screen" id="s-upload">
  <p><span class="gold-line">Upload a photo of your kid.</span><br>We'll automatically remove the background.</p>
  <input type="file" id="file-input" accept="image/*" style="display:none;">
  <button class="btn-gold" onclick="document.getElementById('file-input').click()">Choose Photo</button>
  <button class="btn-sec" onclick="show('s-style-select')">← Back</button>
</div>

<!-- TEXT ENTRY -->
<div class="screen" id="s-text-entry">
  <h2 style="font-size:22px;font-weight:900;color:#dac16d;">Add your text</h2>
  <div class="input-group">
    <label>Main Headline</label>
    <input type="text" id="input-headline" maxlength="24" placeholder="ENTER NAME">
  </div>
  <div class="input-group">
    <label>Additional Text</label>
    <input type="text" id="input-subtitle" maxlength="24" placeholder="ENTER TEAM / TITLE">
  </div>
  <div class="color-row">
    <div class="color-group">
      <label>Text Colour</label>
      <input type="color" id="input-fill-color">
    </div>
    <div class="color-group">
      <label>Outline Colour</label>
      <input type="color" id="input-stroke-color">
    </div>
  </div>
  <button class="btn-gold" onclick="goToPosition()">Continue →</button>
  <button class="btn-sec" onclick="show('s-style-select')">← Back</button>
</div>

<!-- POSITION -->
<div class="screen" id="s-position">
  <div class="canvas-wrap" id="position-canvas-wrap">
    <canvas id="position-canvas"></canvas>
    <div class="hint-pill"><span>🤏 Pinch to zoom · Drag to move</span></div>
    <div class="loading-overlay" id="position-loading" style="display:none;"><div class="spinner"></div></div>
  </div>
  <button class="btn-gold" onclick="goToPreview()">Use This Position →</button>
  <button class="btn-sec" onclick="document.getElementById('file-input').click()">Choose Different Photo</button>
</div>

<!-- PREVIEW -->
<div class="screen" id="s-preview">
  <canvas id="preview-canvas"></canvas>
  <p style="text-align:center;font-size:14px;font-weight:700;color:#fff;">Ready to download</p>
  <button class="btn-gold" onclick="downloadPoster()">Save Print Quality Image</button>
  <button class="btn-sec" onclick="show('s-text-entry')">Edit Text</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = "https://ypflsgovwhtgrqenqmja.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Y74uRzgaLZ8fLRaz6pFemA_xsXmCf9v";
const EDGE_FUNCTION_URL = SUPABASE_URL + "/functions/v1/bright-service";

const CANVAS_W = 3354, CANVAS_H = 4743;

// Every poster style is data, not code - adding style #47 later means adding
// a row here (plus uploading its background/font), never touching the
// rendering logic itself.
const POSTER_STYLES = [
  {
    id: 'stadium',
    name: 'Sports Star',
    backgroundUrl: 'backgrounds/poster_stadium.jpg',
    menuThumbUrl: 'menu/menu_stadium.jpg',
    fontFile: 'fonts/anton-regular.ttf',
    fontFamily: 'PosterFont_stadium',
    defaultFill: '#2ea84a',
    defaultStroke: '#ffffff',
    photo: { x: 250, y: 900, w: 2854, h: 3050 },
    fadeStart: 3650, fadeEnd: 3980,
    headline: { y: 4070, size: 680, maxWidth: 3100 },
    subtitle: { y: 4473, size: 390, maxWidth: 3100 }
  },
  {
    id: 'superhero',
    name: 'Super Hero',
    backgroundUrl: 'backgrounds/poster_superhero.jpg',
    menuThumbUrl: 'menu/menu_superhero.jpg',
    fontFile: 'fonts/bangers-regular.ttf',
    fontFamily: 'PosterFont_superhero',
    defaultFill: '#ffffff',
    defaultStroke: '#000000',
    photo: { x: 250, y: 900, w: 2854, h: 3050 },
    fadeStart: 3650, fadeEnd: 3980,
    headline: { y: 4070, size: 680, maxWidth: 3100 },
    subtitle: { y: 4473, size: 390, maxWidth: 3100 }
  },
  {
    id: 'princess',
    name: 'Princess',
    backgroundUrl: 'backgrounds/poster_princess.jpg',
    menuThumbUrl: 'menu/menu_princess.jpg',
    fontFile: 'fonts/aquis-regular.otf',
    fontFamily: 'PosterFont_princess',
    defaultFill: '#ff5fa2',
    defaultStroke: '#ffffff',
    photo: { x: 250, y: 900, w: 2854, h: 3050 },
    fadeStart: 3650, fadeEnd: 3980,
    headline: { y: 4070, size: 680, maxWidth: 3100 },
    subtitle: { y: 4473, size: 390, maxWidth: 3100 }
  },
  {
    id: 'winter_princess',
    name: 'Winter Princess',
    backgroundUrl: 'backgrounds/poster_winter_princess.jpg',
    menuThumbUrl: 'menu/menu_winter_princess.jpg',
    fontFile: 'fonts/aquis-regular.otf',
    fontFamily: 'PosterFont_winter_princess',
    defaultFill: '#8fd3ff',
    defaultStroke: '#ffffff',
    photo: { x: 250, y: 900, w: 2854, h: 3050 },
    fadeStart: 3650, fadeEnd: 3980,
    headline: { y: 4070, size: 680, maxWidth: 3100 },
    subtitle: { y: 4473, size: 390, maxWidth: 3100 }
  }
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentStyle = null;
let cutoutImg = null;          // background-removed photo (Image object)
let backgroundImg = null;      // currently loaded style background (Image object)
let finalDataURL = null;
let uploadState = { x: 0, y: 0, scale: 1, isDragging: false, startX: 0, startY: 0, imgStartX: 0, imgStartY: 0, lastDist: null };
let touchesSetup = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.onload = () => {
  buildStyleGrid();
  show('s-style-select');
};

function buildStyleGrid() {
  const grid = document.getElementById('style-grid');
  grid.innerHTML = '';
  POSTER_STYLES.forEach(style => {
    const card = document.createElement('button');
    card.className = 'style-card';
    card.onclick = () => selectStyle(style);
    card.innerHTML = `<img src="${style.menuThumbUrl}" alt="${style.name}"><div class="label">${style.name}</div>`;
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
// STYLE SELECTION
// ═══════════════════════════════════════════════════════
async function selectStyle(style) {
  currentStyle = style;
  cutoutImg = null;
  finalDataURL = null;

  // Pre-fill color pickers and inputs with this style's defaults
  document.getElementById('input-fill-color').value = style.defaultFill;
  document.getElementById('input-stroke-color').value = style.defaultStroke;
  document.getElementById('input-headline').value = '';
  document.getElementById('input-subtitle').value = '';

  // Load the font for this style (safe to call repeatedly - browsers cache by URL)
  try {
    const fontFace = new FontFace(style.fontFamily, `url(${style.fontFile})`);
    const loaded = await fontFace.load();
    document.fonts.add(loaded);
  } catch (e) {
    console.error('Font load failed, will fall back to default:', e);
  }

  // Preload the background image for this style
  backgroundImg = await loadImageSafe(style.backgroundUrl);

  show('s-upload');
}

function getFont(style) {
  return `"${style.fontFamily}", Impact, Arial Black, sans-serif`;
}

// ═══════════════════════════════════════════════════════
// UPLOAD + BACKGROUND REMOVAL
// ═══════════════════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', handleFileSelected);

function handleFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const reader = new FileReader();
  reader.onload = async (e) => {
    // Go straight to text entry - background removal runs in the background
    // while the user types, so there's no blocking "please wait" screen.
    show('s-text-entry');

    let blobToUpload;
    try {
      blobToUpload = await resizeImageForUpload(e.target.result);
    } catch (err) {
      console.error('Resize failed, falling back to original image:', err);
      blobToUpload = await (await fetch(e.target.result)).blob();
    }
    removeBackground(blobToUpload); // fire and forget - resolves cutoutImg when ready
  };
  reader.readAsDataURL(file);
}

// Targets an actual byte-size budget rather than guessing a fixed pixel
// dimension - caps at 4000px (safely under PicWish's documented 4096 limit)
// then steps down JPEG quality if still too large.
const UPLOAD_MAX_DIM = 4000;
const UPLOAD_TARGET_BYTES = 15 * 1024 * 1024;

async function resizeImageForUpload(dataURL) {
  const img = await new Promise((resolve, reject) => {
    const el = new Image();
    el.onload = () => resolve(el);
    el.onerror = () => reject(new Error('Failed to load image for resizing'));
    el.src = dataURL;
  });

  let { width, height } = img;
  if (width > UPLOAD_MAX_DIM || height > UPLOAD_MAX_DIM) {
    const scale = UPLOAD_MAX_DIM / Math.max(width, height);
    width = Math.round(width * scale);
    height = Math.round(height * scale);
  }
  const cv = document.createElement('canvas');
  cv.width = width; cv.height = height;
  const ctx = cv.getContext('2d');
  ctx.drawImage(img, 0, 0, width, height);

  const toBlobAsync = (quality) => new Promise((resolve, reject) => {
    cv.toBlob(blob => {
      if (!blob) { reject(new Error('canvas.toBlob returned null')); return; }
      resolve(blob);
    }, 'image/jpeg', quality);
  });

  let quality = 0.92;
  let blob = await toBlobAsync(quality);
  let attempts = 0;
  while (blob.size > UPLOAD_TARGET_BYTES && attempts < 6) {
    if (quality > 0.5) {
      quality -= 0.1;
    } else {
      width = Math.round(width * 0.85);
      height = Math.round(height * 0.85);
      cv.width = width; cv.height = height;
      ctx.drawImage(img, 0, 0, width, height);
    }
    blob = await toBlobAsync(quality);
    attempts++;
  }
  return blob;
}

async function removeBackground(imageBlob) {
  try {
    const uploadForm = new FormData();
    uploadForm.append('image', imageBlob, 'photo.jpg');

    const response = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      body: uploadForm
    });

    if (!response.ok) {
      const errorText = await response.text().catch(() => '');
      throw new Error(`Background removal service returned status ${response.status}. ${errorText.slice(0, 200)}`);
    }

    const data = await response.json();
    if (data.error) throw new Error(data.error);

    const img = await loadImageSafe(data.cutoutUrl);
    if (!img) throw new Error('Failed to load processed cutout image');
    cutoutImg = img;

    // If the user is already sitting on the position screen waiting, hide
    // the loading overlay and initialize now that the cutout is ready.
    if (document.getElementById('s-position').classList.contains('active')) {
      document.getElementById('position-loading').style.display = 'none';
      initPositionCanvas();
    }
  } catch (e) {
    console.error('Background removal error:', e);
    alert('Background removal failed: ' + e.message + '\n\nPlease try again.');
    show('s-upload');
  }
}

function loadImageSafe(src) {
  return new Promise(resolve => {
    const im = new Image();
    im.crossOrigin = 'anonymous';
    im.onload = () => resolve(im);
    im.onerror = () => resolve(null);
    im.src = src;
  });
}

// ═══════════════════════════════════════════════════════
// TEXT ENTRY → POSITION
// ═══════════════════════════════════════════════════════
function goToPosition() {
  show('s-position');
  if (cutoutImg) {
    initPositionCanvas();
  } else {
    // Cutout not ready yet (rare - usually finishes before someone gets
    // through typing text and colors). Show a loading state instead of a
    // broken/empty canvas until removeBackground() finishes and calls
    // initPositionCanvas() itself.
    document.getElementById('position-loading').style.display = 'flex';
  }
}

function initPositionCanvas() {
  const canvas = document.getElementById('position-canvas');
  const wrap = document.getElementById('position-canvas-wrap');
  const vpW = wrap.offsetWidth || window.innerWidth;
  const vpH = vpW * (CANVAS_H / CANVAS_W);
  canvas.width = vpW;
  canvas.height = vpH;

  const zoneW = currentStyle.photo.w;
  const zoneH = currentStyle.photo.h;
  const displayZoneW = vpW * (zoneW / CANVAS_W);
  const displayZoneH = vpH * (zoneH / CANVAS_H);

  const scaleW = displayZoneW / cutoutImg.width;
  const scaleH = displayZoneH / cutoutImg.height;
  uploadState.scale = Math.min(scaleW, scaleH) * 0.95;

  uploadState.x = vpW / 2 - (cutoutImg.width * uploadState.scale) / 2;
  uploadState.y = vpH * (currentStyle.photo.y / CANVAS_H);
  uploadState.isDragging = false;
  uploadState.lastDist = null;

  setupTouchEvents();
  renderPositionCanvas();
}

function renderPositionCanvas() {
  const canvas = document.getElementById('position-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);
  if (backgroundImg) ctx.drawImage(backgroundImg, 0, 0, W, H);

  const iw = cutoutImg.width * uploadState.scale;
  const ih = cutoutImg.height * uploadState.scale;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.65)';
  ctx.shadowBlur = H * 0.045;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = H * 0.025;
  ctx.drawImage(cutoutImg, uploadState.x, uploadState.y, iw, ih);
  ctx.restore();

  // Fade
  const fadeStart = H * (currentStyle.fadeStart / CANVAS_H);
  const fadeEnd = H * (currentStyle.fadeEnd / CANVAS_H);
  const gradient = ctx.createLinearGradient(0, fadeStart, 0, fadeEnd);
  gradient.addColorStop(0, 'rgba(0,0,0,0)');
  gradient.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = gradient;
  ctx.fillRect(0, fadeStart, W, fadeEnd - fadeStart);
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.fillRect(0, fadeEnd, W, H - fadeEnd);
  ctx.globalCompositeOperation = 'source-over';

  drawText(ctx, W, H);
}

function drawText(ctx, W, H) {
  const headline = document.getElementById('input-headline').value.toUpperCase();
  const subtitle = document.getElementById('input-subtitle').value.toUpperCase();
  const fillColor = document.getElementById('input-fill-color').value;
  const strokeColor = document.getElementById('input-stroke-color').value;
  const font = getFont(currentStyle);

  ctx.textAlign = 'center';
  ctx.lineJoin = 'round';

  if (headline) {
    const cfg = currentStyle.headline;
    let size = cfg.size * (H / CANVAS_H);
    const maxW = cfg.maxWidth * (W / CANVAS_W);
    ctx.font = `900 ${size}px ${font}`;
    while (ctx.measureText(headline).width > maxW && size > 10) {
      size -= 2;
      ctx.font = `900 ${size}px ${font}`;
    }
    const y = H * (cfg.y / CANVAS_H);
    const strokeW = Math.max(3, size * 0.06);
    ctx.lineWidth = strokeW;
    ctx.strokeStyle = strokeColor;
    ctx.strokeText(headline, W / 2, y);
    ctx.fillStyle = fillColor;
    ctx.fillText(headline, W / 2, y);
  }

  if (subtitle) {
    const cfg = currentStyle.subtitle;
    let size = cfg.size * (H / CANVAS_H);
    const maxW = cfg.maxWidth * (W / CANVAS_W);
    ctx.font = `900 ${size}px ${font}`;
    while (ctx.measureText(subtitle).width > maxW && size > 8) {
      size -= 2;
      ctx.font = `900 ${size}px ${font}`;
    }
    const y = H * (cfg.y / CANVAS_H);
    const strokeW = Math.max(2, size * 0.06);
    ctx.lineWidth = strokeW;
    ctx.strokeStyle = strokeColor;
    ctx.strokeText(subtitle, W / 2, y);
    ctx.fillStyle = fillColor;
    ctx.fillText(subtitle, W / 2, y);
  }
}

// ═══════════════════════════════════════════════════════
// TOUCH / DRAG / PINCH (reused pattern from football card position screen)
// ═══════════════════════════════════════════════════════
function setupTouchEvents() {
  if (touchesSetup) return;
  touchesSetup = true;
  const canvas = document.getElementById('position-canvas');

  function getDist(t1, t2) {
    return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      uploadState.isDragging = true;
      uploadState.startX = e.touches[0].clientX;
      uploadState.startY = e.touches[0].clientY;
      uploadState.imgStartX = uploadState.x;
      uploadState.imgStartY = uploadState.y;
    } else if (e.touches.length === 2) {
      uploadState.isDragging = false;
      uploadState.lastDist = getDist(e.touches[0], e.touches[1]);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleFactor = canvas.width / rect.width;

    if (e.touches.length === 1 && uploadState.isDragging) {
      const dx = (e.touches[0].clientX - uploadState.startX) * scaleFactor;
      const dy = (e.touches[0].clientY - uploadState.startY) * scaleFactor;
      uploadState.x = uploadState.imgStartX + dx;
      uploadState.y = uploadState.imgStartY + dy;
      renderPositionCanvas();
    } else if (e.touches.length === 2 && uploadState.lastDist) {
      const newDist = getDist(e.touches[0], e.touches[1]);
      const scaleDelta = newDist / uploadState.lastDist;
      const oldScale = uploadState.scale;
      uploadState.scale *= scaleDelta;
      uploadState.scale = Math.max(0.05, Math.min(uploadState.scale, 5));
      const cx = canvas.width / 2, cy = canvas.height / 2;
      uploadState.x = cx - (cx - uploadState.x) * (uploadState.scale / oldScale);
      uploadState.y = cy - (cy - uploadState.y) * (uploadState.scale / oldScale);
      uploadState.lastDist = newDist;
      renderPositionCanvas();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    uploadState.isDragging = false;
    uploadState.lastDist = null;
  });

  // Mouse fallback for desktop testing
  let mouseDown = false;
  canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    uploadState.startX = e.clientX;
    uploadState.startY = e.clientY;
    uploadState.imgStartX = uploadState.x;
    uploadState.imgStartY = uploadState.y;
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const rect = canvas.getBoundingClientRect();
    const scaleFactor = canvas.width / rect.width;
    uploadState.x = uploadState.imgStartX + (e.clientX - uploadState.startX) * scaleFactor;
    uploadState.y = uploadState.imgStartY + (e.clientY - uploadState.startY) * scaleFactor;
    renderPositionCanvas();
  });
  window.addEventListener('mouseup', () => { mouseDown = false; });
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const oldScale = uploadState.scale;
    uploadState.scale *= (e.deltaY < 0 ? 1.05 : 0.95);
    uploadState.scale = Math.max(0.05, Math.min(uploadState.scale, 5));
    const cx = canvas.width / 2, cy = canvas.height / 2;
    uploadState.x = cx - (cx - uploadState.x) * (uploadState.scale / oldScale);
    uploadState.y = cy - (cy - uploadState.y) * (uploadState.scale / oldScale);
    renderPositionCanvas();
  }, { passive: false });
}

// ═══════════════════════════════════════════════════════
// PREVIEW (full resolution render)
// ═══════════════════════════════════════════════════════
async function goToPreview() {
  const canvas = document.getElementById('preview-canvas');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  const ctx = canvas.getContext('2d');

  const displayCanvas = document.getElementById('position-canvas');
  const scaleX = CANVAS_W / displayCanvas.width;
  const scaleY = CANVAS_H / displayCanvas.height;

  ctx.drawImage(backgroundImg, 0, 0, CANVAS_W, CANVAS_H);

  const iw = cutoutImg.width * uploadState.scale * scaleX;
  const ih = cutoutImg.height * uploadState.scale * scaleY;
  const ix = uploadState.x * scaleX;
  const iy = uploadState.y * scaleY;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.65)';
  ctx.shadowBlur = CANVAS_H * 0.045;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = CANVAS_H * 0.025;
  ctx.drawImage(cutoutImg, ix, iy, iw, ih);
  ctx.restore();

  const gradient = ctx.createLinearGradient(0, currentStyle.fadeStart, 0, currentStyle.fadeEnd);
  gradient.addColorStop(0, 'rgba(0,0,0,0)');
  gradient.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = gradient;
  ctx.fillRect(0, currentStyle.fadeStart, CANVAS_W, currentStyle.fadeEnd - currentStyle.fadeStart);
  ctx.fillStyle = 'rgba(0,0,0,1)';
  ctx.fillRect(0, currentStyle.fadeEnd, CANVAS_W, CANVAS_H - currentStyle.fadeEnd);
  ctx.globalCompositeOperation = 'source-over';

  drawText(ctx, CANVAS_W, CANVAS_H);

  finalDataURL = canvas.toDataURL('image/jpeg', 0.95);
  show('s-preview');
}

// ═══════════════════════════════════════════════════════
// DOWNLOAD
// (No paywall yet - this build is the creation flow only, per the agreed
// build order. Payment/access gating is a separate, later addition.)
// ═══════════════════════════════════════════════════════
function downloadPoster() {
  if (!finalDataURL) return;
  try {
    const a = document.createElement('a');
    a.href = finalDataURL;
    const ts = new Date().toISOString().replace(/[-:T]/g, '').slice(0, 15);
    a.download = `poster_${currentStyle.id}_${ts}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    console.error('Download failed:', e);
    alert('Download failed. Please try again.');
  }
}
